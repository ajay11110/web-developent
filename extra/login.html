<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>

    <style>
        * {
            padding: 0;
            margin: 0;
        }

        .bg {
            width: 100vw;
            height: 100vh;
            background-color: rgb(224, 224, 224);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start {
            width: 700px;
            height: 500px;
            border: 0px solid black;
            border-radius: 15px;
            background-color: white;
            box-shadow: 0 0 9px 1px rgba(128, 128, 128, 0.646);
            display: flex;
        }

        .left {
            height: 500px;
            width: 300px;
            background-color: rgb(94, 255, 58);
            border-radius: 60px 15px 15px 60px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .t1 {
            font-weight: 900;
            font-size: 35px;
        }

        .t2 {
            font-size: 18px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0);
            padding: 10px 40px;
            border: 2px solid white;
            border-radius: 5px;
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* padding-top: 50px; */
            align-items: center;
            height: 500px;
            width: 400px;
            gap: 20px;
        }

        .text {
            color: black;
            font-size: 35px;
            font-weight: 900;
        }

        .email,
        .password {
            background-color: rgba(151, 150, 150, 0.23);
            height: 40px;
            width: 290px;
            padding-left: 10px;
            border: 0;
            border-radius: 10px;
        }

        .login {
            color: black;
            font-size: 20px;
            font-weight: 600;
            padding: 10px 29px;
            border: 0;
            border-radius: 6px;
            background-color: rgb(94, 255, 58);
        }

        .methods {
            display: flex;
            gap: 15px;
        }

        .method {
            width: 50px;
            height: 50px;
            background-color: rgba(128, 128, 128, 0.199);
            border-radius: 5px;
        }

        .m1 {
            font-weight: 900;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .m2 {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text2 {
            color: grey;
        }
    </style>
</head>

                <div class="text">Log In</div>
