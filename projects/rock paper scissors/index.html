<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scessors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <div class="playtext">Let's play Rock - Paper - Scissor</div>
        <div class="display">
            <div class="playbtn">
                <button class="btn play">Play</button>
            </div>
            <div class="show">
                <div class="text">Choose your option - </div>
                <div class="btns">
                    <button class="btn rock">Rock</button>
                    <button class="btn paper">Paper</button>
                    <button class="btn scessors">Scissors</button>
                </div>
            </div>
            <div class="result">
                <div class="answer_box">
                    <span class="answer_text text">My choice is - </span>
                    <span class="answer text">Rock</span>
                    <div class="final_result text"></div>
                    <div class="retrybtn">
                        <button class="btn retry">Retry</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
