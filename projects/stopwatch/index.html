<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="con">
        <div class="border">
            <div class="display">
                <div class="text hour">00</div>
                <div class="doubledot text"> : </div>
                <div class="text minit">00</div>
                <div class="doubledot text"> : </div>
                <div class="text sec">00</div>
                <div class="doubledot text"> : </div>
                <div class="text milisec">00</div>
            </div>
            <div class="btns">
                <button class="btn start">Start</button>
                <button class="btn stop">Stop</button>
                <button class="btn lap">Lap</button>
                <button class="btn restart">Reset</button>
            </div>
        </div>
        <div class="laps"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
