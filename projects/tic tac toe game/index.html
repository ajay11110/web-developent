<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="start">

        <div class="player">X's move</div>

        <div class="border">
            <div class="cell c1" data-index="1"></div>
            <div class="cell c2" data-index="2"></div>
            <div class="cell c3" data-index="3"></div>
            <div class="cell c4" data-index="4"></div>
            <div class="cell c5" data-index="5"></div>
            <div class="cell c6" data-index="6"></div>
            <div class="cell c7" data-index="7"></div>
            <div class="cell c8" data-index="8"></div>
            <div class="cell c9" data-index="9"></div>
        </div>

        <div class="draw">
            <div class="dtext text">Draw</div>
            <button class="restart">Restart</button>
        </div>
        <div class="win">
            <div class="wtext text">O wins</div>
            <button class="restart">Restart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
