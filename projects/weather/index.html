<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weather</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="start">
    <div class="border">
      <div class="inputdiv">
        <input class="input" type="text" name="search" id="input" placeholder="Search city Name">
        <svg class="searchbtn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#ffffff" fill="none"
          stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 17L21 21"></path>
          <path
            d="M19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19C15.4183 19 19 15.4183 19 11Z">
          </path>
        </svg>
      </div>
      <div class="date">wednesday , 15 july </div>
      <div class="city">Jaipur</div>
      <div class="temp">15 deg</div>
      <div class="feelslike"> feels like - 19 deg</div>
      <div class="weatherdiv">
        <div class="weather">Cloud</div>
        <div class="weathericon">ok</div>
      </div>
      <div class="lower">
        <div class="lables">
          <div class="lable maxtemp">Max Temp.</div>
          <div class="lable mintemp">Min. Temp.</div>
          <div class="lable wind">Wind speed</div>
          <div class="lable pressure">Pressure</div>
          <div class="lable humidity">Humidity</div>
          <div class="lable sunrise">Sunrise</div>
          <div class="lable sunset">Sunsine</div>
        </div>
        <div class="data-s">
          <div class="data maxtempdata"><span class="maxtempinnerdata">23 deg</span></div>
          <div class="data mintempdata"><span class="mintempinnerdata">0 deg</span></div>
          <div class="data winddata"><span class="windinnerdata">12 kmph</span></div>
          <div class="data pressuredata"><span class="pressureinnerdata"> 2 atm</span></div>
          <div class="data humiditydata"><span class="humidityinnerdata">39%</span></div>
          <div class="data sunrisedata"><span class="sunriseinnerdata">11:23</span></div>
          <div class="data sunsetdata"><span class="sunsetinnerdata">12:45</span></div>
        </div>
        <div class="data"></div>
      </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
