<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="start">
        <div class="con">
            <button class="btn r1 green">AC</button>
            <button class="btn r1 green">%</button>
            <button class="btn r1 green">DE</button>
            <button class="btn r1 calc">/</button>
            <button class="btn r2">7</button>
            <button class="btn r2">8</button>
            <button class="btn r2">9</button>
            <button class="btn r2 calc">x</button>
            <button class="btn r3">4</button>
            <button class="btn r3">5</button>
            <button class="btn r3">6</button>
            <button class="btn r3 calc">-</button>
            <button class="btn r4">1</button>
            <button class="btn r4">2</button>
            <button class="btn r4">3</button>
            <button class="btn r4 calc">+</button>
            <button class="btn r5">00</button>
            <button class="btn r5">0</button>
            <button class="btn r5">.</button>
            <button class="btn r5 bg">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
